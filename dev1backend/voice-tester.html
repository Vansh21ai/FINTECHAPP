<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Agent Tester</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; max-width: 600px; width: 90%; }
        h1 { margin-bottom: 5px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        select, input { padding: 10px 15px; border-radius: 8px; border: none; outline: none; background: #1e293b; color: white; border: 1px solid #334155; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        button:hover { background: #0ea5e9; transform: scale(1.05); box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); }
        button.recording { background: #ef4444; box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); animation: pulse 1.5s infinite; }
        .status { margin-top: 20px; font-size: 16px; color: #a3e635; min-height: 24px; font-weight: bold; }
        .transcript { margin-top: 20px; padding: 15px; background: #1e293b; border-radius: 10px; text-align: left; font-size: 15px; border: 1px solid #334155; min-height: 60px; color: #cbd5e1; }
        .ai-response { margin-top: 15px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-radius: 10px; text-align: left; font-size: 15px; border: 1px solid rgba(56, 189, 248, 0.3); min-height: 60px; color: #e0f2fe; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ Gen-Z AI Voice Agent</h1>
        <p>This is a live connection to your backend. The AI dynamically adapts its persona based on the mode you select. Speak clearly into your microphone!</p>

        <div class="controls">
            <!-- Completely removed all manual dropdowns -->
        </div>

        <button id="talkBtn">🎙️ Initialize & Speak</button>
        
        <div class="status" id="statusText">Ready and waiting...</div>

        <div class="transcript">
            <strong>👤 You said:</strong> <br>
            <span id="userText">...</span>
        </div>

        <div class="ai-response">
            <strong>🤖 AI Agent Reply:</strong> <br>
            <span id="aiText">...</span>
        </div>
    </div>

    <script>
        const talkBtn = document.getElementById('talkBtn');
        const statusText = document.getElementById('statusText');
        const userText = document.getElementById('userText');
        const aiText = document.getElementById('aiText');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        }
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;

        let isFirstRun = true;

        talkBtn.addEventListener('click', () => {
            if (isFirstRun) {
                isFirstRun = false;
                talkBtn.innerText = "🤖 Speaking...";
                statusText.innerText = "Greeting user...";
                speakText("What can I help you with today?", () => {
                    startListening();
                });
            } else {
                startListening();
            }
        });

        function startListening() {
            recognition.lang = 'en-US'; 
            try {
                recognition.start();
                talkBtn.classList.add('recording');
                talkBtn.innerText = "🛑 Listening...";
                statusText.innerText = "Listening to your voice...";
            } catch (e) {}
        }

        recognition.onresult = async (event) => {
            const spokenWords = event.results[0][0].transcript;
            userText.innerText = `"${spokenWords}"`;

            // Normal backend AI Flow
            statusText.innerText = `Sending to your backend AI...`;
            statusText.style.color = "#facc15";

            try {
                const response = await fetch('https://fintechapp-cljw.onrender.com/api/voice/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        spoken_text: spokenWords
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    statusText.innerText = "AI is speaking!";
                    statusText.style.color = "#a3e635";
                    aiText.innerText = data.answer;
                    speakText(data.answer, () => {
                        // After speaking the answer, auto-open the mic for the next continuous conversation!
                        setTimeout(startListening, 500);
                    });
                } else {
                    statusText.innerText = "Error from backend: " + data.error;
                    statusText.style.color = "#ef4444";
                }

            } catch (err) {
                statusText.innerText = "Failed to reach backend. The server may be sleeping — try again in a moment.";
                statusText.style.color = "#ef4444";
            }
        };

        recognition.onspeechend = () => {
            recognition.stop();
            talkBtn.classList.remove('recording');
            if (appState === 'WAITING_LANG') {
                talkBtn.innerText = "🎙️ Tap if it didn't hear";
            } else {
                talkBtn.innerText = "🎙️ Tap to Speak";
            }
        };

        recognition.onerror = (event) => {
            statusText.innerText = "Microphone Permission Error!";
            statusText.style.color = "#ef4444";
            talkBtn.classList.remove('recording');
            talkBtn.innerText = "🎙️ Tap to Speak";
            appState = 'INIT'; // Reset so they can try again
        };

        function speakText(text, callback) {
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(text);
            
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.lang === 'en-US' || v.name.includes('Google US English'));
            if (preferredVoice) {
                utterThis.voice = preferredVoice;
            }
            
            utterThis.rate = 1.15;  // Slightly faster
            utterThis.pitch = 1.0;
            
            utterThis.onend = () => {
                statusText.innerText = "Ready for your next question.";
                talkBtn.innerText = "🎙️ Tap to Speak";
                if (callback) callback();
            };
            
            synth.speak(utterThis);
        }
        
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
